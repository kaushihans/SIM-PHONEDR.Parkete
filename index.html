<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paketshop FINAL V4</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    height:100vh;
}

.box{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    gap:10px;
}

.trashBtn{
    font-size:14px;
    padding:8px 12px;
    border:none;
    cursor:pointer;
}

/* COLORS */
.dpd{background:#d60000;}
.gls{background:#0b2a6f;}
.hermes{background:#4aa3ff;}

/* APP */
.app{
    display:none;
    padding:10px;
}

header{
    color:white;
    padding:12px;
    font-size:18px;
}

.card{
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

.item{
    background:white;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
}

.big{
    font-size:20px;
    font-weight:bold;
}

button{
    padding:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

    <div class="box dpd" onclick="openFirma('dpd')">
        DPD
        <button class="trashBtn" onclick="openTrash(event,'dpd')">🗑 Papierkorb</button>
    </div>

    <div class="box gls" onclick="openFirma('gls')">
        GLS
        <button class="trashBtn" onclick="openTrash(event,'gls')">🗑 Papierkorb</button>
    </div>

    <div class="box hermes" onclick="openFirma('hermes')">
        Hermes
        <button class="trashBtn" onclick="openTrash(event,'hermes')">🗑 Papierkorb</button>
    </div>

</div>

<!-- APP -->
<div id="app" class="app">

<header id="header"></header>

<button onclick="back()">⬅ Zurück</button>

<div class="card">
<h3>Neues Paket</h3>

<input id="name" placeholder="Name" autofocus>

<select id="size">
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>

<select id="type">
<option>Paket</option>
<option>Tüte</option>
<option>Box</option>
<option>Lang & flach</option>
</select>

<button onclick="add()">Speichern</button>
</div>

<div class="card">
<h3>Pakete</h3>
<div id="list"></div>
</div>

</div>

<script>

let firma=null;
let mode="list";

let data=JSON.parse(localStorage.getItem("db"))||{
 dpd:{counter:1000,items:[],trash:[]},
 gls:{counter:2000,items:[],trash:[]},
 hermes:{counter:3000,items:[],trash:[]}
};

function save(){
 localStorage.setItem("db",JSON.stringify(data));
}

/* THEME */
function setHeader(f){
 let c={dpd:"#d60000",gls:"#0b2a6f",hermes:"#4aa3ff"};
 let h=document.getElementById("header");
 h.style.background=c[f];
 h.innerText=f.toUpperCase();
}

/* OPEN */
function openFirma(f){
 firma=f;
 mode="list";

 document.getElementById("dashboard").style.display="none";
 document.getElementById("app").style.display="block";

 setHeader(f);
 render();

 setTimeout(()=>document.getElementById("name").focus(),100);
}

/* BACK */
function back(){
 document.getElementById("dashboard").style.display="grid";
 document.getElementById("app").style.display="none";
}

/* ID */
function getId(){
 let ids=data[firma].items.map(x=>x.id);
 let id=data[firma].counter;
 while(ids.includes(id)) id++;
 data[firma].counter=id+1;
 return id;
}

/* ADD */
function add(){

 let name=document.getElementById("name").value.trim();
 if(!name) return;

 data[firma].items.unshift({
  id:getId(),
  name,
  size:document.getElementById("size").value,
  type:document.getElementById("type").value,
  created:Date.now()
 });

 save();
 render();

 document.getElementById("name").value="";
 document.getElementById("name").focus();
}

/* DELETE */
function del(i){
 let item=data[firma].items.splice(i,1)[0];
 item.deleted=Date.now();
 data[firma].trash.unshift(item);
 save();
 render();
}

/* RESTORE */
function restore(i){
 let item=data[firma].trash.splice(i,1)[0];
 data[firma].items.unshift(item);
 save();
 render();
}

/* 10 DAYS */
function warn(x){
 return Date.now()-x.created>10*24*60*60*1000;
}

/* RENDER */
function render(){

 let list=document.getElementById("list");
 list.innerHTML="";

 data[firma].items
 .sort((a,b)=>b.created-a.created)
 .forEach((x,i)=>{

  list.innerHTML+=`
  <div class="item">
  <div class="big">📦 ${x.id}</div>
  ${x.name} | ${x.size} | ${x.type}
  ${warn(x)?"<div style='color:red'>⚠ älter als 10 Tage</div>":""}
  <br><button onclick="del(${i})">Löschen</button>
  </div>`;
 });

 save();
}

/* TRASH */
function openTrash(e,f){

 e.stopPropagation();

 firma=f;
 mode="trash";

 document.getElementById("dashboard").style.display="none";
 document.getElementById("app").style.display="block";

 setHeader(f+" Papierkorb");
 renderTrash();
}

/* TRASH RENDER */
function renderTrash(){

 let list=document.getElementById("list");
 list.innerHTML="";

 data[firma].trash.forEach((x,i)=>{

  let h=((Date.now()-x.deleted)/3600000).toFixed(1);

  list.innerHTML+=`
  <div class="item">
  📦 ${x.id} - ${x.name}<br>
  ⏳ ${h}h im Papierkorb<br>
  <button onclick="restore(${i})">Wiederherstellen</button>
  </div>`;
 });
}

/* KEYBOARD CONTROL */
document.addEventListener("keydown",function(e){

 if(e.key==="Enter" && firma){
  add();
 }

 if(e.key==="Escape"){
  document.getElementById("name").value="";
  document.getElementById("size").selectedIndex=0;
  document.getElementById("type").selectedIndex=0;
  document.getElementById("name").focus();
 }

});

</script>

</body>
</html>
