<div class="card">
    <h3>Neues Paket</h3>

    <input id="name" placeholder="Name">

    <select id="size">
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
    </select>

    <select id="form">
        <option>Paket</option>
        <option>Tüte</option>
        <option>Box</option>
        <option>Lang & flach</option>
    </select>

    <input id="info" placeholder="Info (optional)">

    <button onclick="addPackage()">Speichern</button>
</div>

<div class="card">
    <h3>Kunden</h3>
    <div id="list"></div>
</div>
