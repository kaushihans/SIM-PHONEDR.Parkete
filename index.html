<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paketshop Pro V5</title>

<style>
:root{
    --dpd:#d60000;
    --gls:#0b2a6f;
    --hermes:#4aa3ff;

    --bg:#f4f6f8;
    --card:#fff;
    --text:#111;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    height:100vh;
}

.box{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.dpd{background:var(--dpd);}
.gls{background:var(--gls);}
.hermes{background:var(--hermes);}

.app{display:none;padding:10px;}

.header{
    padding:15px;
    color:white;
    font-size:20px;
    font-weight:bold;
    border-radius:8px;
    margin-bottom:10px;
}

.card{
    background:var(--card);
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

input,select,button{
    width:100%;
    padding:8px;
    margin:5px 0;
}

.item{
    border-left:4px solid #999;
    padding:6px;
    margin:6px 0;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<div class="box dpd" onclick="openFirma('dpd')">DPD</div>
<div class="box gls" onclick="openFirma('gls')">GLS</div>
<div class="box hermes" onclick="openFirma('hermes')">HERMES</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div id="header" class="header"></div>

<button onclick="back()">⬅ Zurück</button>
<button onclick="openTrash()">🗑 Papierkorb</button>

<div id="main">

<div class="card">
<h3>Neues Paket</h3>

<input id="search" placeholder="🔍 Suche Name oder ID" oninput="render()">

<input id="name" placeholder="Name">

<select id="size">
<option>S</option><option>M</option><option>L</option><option>XL</option>
</select>

<select id="form">
<option>Paket</option><option>Tüte</option><option>Box</option><option>Lang</option>
</select>

<input id="info" placeholder="Info">

<button onclick="addPackage()">Speichern</button>

</div>

<div id="list"></div>

</div>

<!-- TRASH -->
<div id="trash" style="display:none;"></div>

</div>

<script>

let currentFirma=null;

let data=JSON.parse(localStorage.getItem("db"))||{
 dpd:{counter:1000,customers:{},trash:[]},
 gls:{counter:2000,customers:{},trash:[]},
 hermes:{counter:3000,customers:{},trash:[]}
};

function save(){
 localStorage.setItem("db",JSON.stringify(data));
}

/* OPEN */
function openFirma(f){
 currentFirma=f;
 document.getElementById("dashboard").style.display="none";
 document.getElementById("app").style.display="block";
 document.getElementById("main").style.display="block";
 document.getElementById("trash").style.display="none";

 document.getElementById("header").innerText=f.toUpperCase();

 render();
}

/* BACK */
function back(){
 document.getElementById("dashboard").style.display="grid";
 document.getElementById("app").style.display="none";
}

/* ADD */
function addPackage(){

 let name=document.getElementById("name").value.trim();
 if(!name) return;

 let f=data[currentFirma];

 if(!f.customers[name]){
  f.customers[name]={
   id:f.counter++,
   packages:[],
   created:Date.now()
  };
 }

 f.customers[name].packages.push({
  size:document.getElementById("size").value,
  form:document.getElementById("form").value,
  info:document.getElementById("info").value,
  time:Date.now()
 });

 save();
 render();
}

/* DELETE -> TRASH */
function deleteCustomer(name){

 if(!confirm("In Papierkorb verschieben?")) return;

 let f=data[currentFirma];
 let item=f.customers[name];

 f.trash.push({
  name:name,
  data:item,
  deletedAt:Date.now()
 });

 delete f.customers[name];
 save();
 render();
}

/* RESTORE */
function restore(index){

 let f=data[currentFirma];
 let item=f.trash[index];

 f.customers[item.name]=item.data;

 f.trash.splice(index,1);

 save();
 renderTrash();
}

/* TRASH VIEW */
function openTrash(){

 document.getElementById("main").style.display="none";
 document.getElementById("trash").style.display="block";

 renderTrash();
}

function renderTrash(){

 let t=document.getElementById("trash");
 t.innerHTML="<h3>Papierkorb</h3>";

 let f=data[currentFirma];

 let now=Date.now();

 f.trash=f.trash.filter(x=>{
  return now-x.deletedAt < 86400000; // 24h
 });

 f.trash.forEach((x,i)=>{
  t.innerHTML+=`
  <div class="card">
   <b>${x.name}</b><br>
   <button onclick="restore(${i})">♻ Wiederherstellen</button>
  </div>`;
 });

 save();
}

/* RENDER */
function render(){

 let list=document.getElementById("list");
 list.innerHTML="";

 let f=data[currentFirma];
 let search=document.getElementById("search").value.toLowerCase();

 for(let name in f.customers){

  if(search &&
   !name.toLowerCase().includes(search) &&
   !String(f.customers[name].id).includes(search)
  ) continue;

  let c=f.customers[name];

  let html=`<div class="card">
  <h3>${name} (ID ${c.id})</h3>`;

  c.packages.forEach((p,i)=>{
   html+=`
   <div class="item">
   Paket ${i+1}<br>
   ${p.size} | ${p.form}<br>
   ${p.info || ""}
   </div>`;
  });

  html+=`
  <button onclick="deleteCustomer('${name}')">🗑 Löschen</button>
  </div>`;

  list.innerHTML+=html;
 }
}

</script>

</body>
</html>
