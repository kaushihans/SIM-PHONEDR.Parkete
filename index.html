<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paketshop PRO V3</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:#111;
    color:white;
    padding:10px;
}

.sidebar button{
    width:100%;
    margin:5px 0;
    padding:10px;
    cursor:pointer;
    border:none;
    color:white;
    background:#333;
}

.sidebar button:hover{
    background:#555;
}

/* MAIN */
.main{
    margin-left:230px;
    padding:15px;
}

/* HEADER */
header{
    padding:15px;
    color:white;
    font-size:20px;
}

/* CARDS */
.card{
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

/* INPUT */
input,select{
    width:100%;
    padding:8px;
    margin:5px 0;
}

/* LIST */
.item{
    background:white;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border-left:5px solid #ccc;
}

.big{
    font-size:22px;
    font-weight:bold;
}

/* WARN */
.warn{
    color:red;
    font-weight:bold;
    margin-top:5px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="sidebar">
<h3>📦 Paketshop</h3>

<button onclick="openFirma('dpd')">DPD</button>
<button onclick="openFirma('gls')">GLS</button>
<button onclick="openFirma('hermes')">Hermes</button>

<hr>

<button onclick="view='list';render()">Pakete</button>
<button onclick="view='search';render()">Suche</button>
<button onclick="openTrash()">Papierkorb</button>
</div>

<div class="main">

<header id="header">Paketshop V3</header>

<!-- INPUT -->
<div class="card">
<h3>Neues Paket</h3>

<input id="name" placeholder="Name">

<select id="size">
<option>XS</option><option>S</option><option>M</option>
<option>L</option><option>XL</option><option>XXL</option>
</select>

<select id="type">
<option>Paket</option>
<option>Tüte</option>
<option>Box</option>
<option>Lang & flach</option>
</select>

<button onclick="add()">Speichern</button>
</div>

<!-- OUTPUT -->
<div id="content"></div>

</div>

<script>

let firma=null;
let view="list";

let data=JSON.parse(localStorage.getItem("db"))||{
 dpd:{counter:1000,items:[],trash:[]},
 gls:{counter:2000,items:[],trash:[]},
 hermes:{counter:3000,items:[],trash:[]}
};

function save(){
 localStorage.setItem("db",JSON.stringify(data));
}

/* THEME */
function setTheme(f){
 let c={dpd:"#d60000",gls:"#0b2a6f",hermes:"#4aa3ff"};
 document.getElementById("header").style.background=c[f];
}

/* FIRMA */
function openFirma(f){
 firma=f;
 setTheme(f);
 render();
}

/* ID */
function getId(){
 let ids=data[firma].items.map(x=>x.id);
 let id=data[firma].counter;
 while(ids.includes(id)) id++;
 data[firma].counter=id+1;
 return id;
}

/* ADD */
function add(){
 if(!firma) return alert("Firma wählen!");

 let name=document.getElementById("name").value.trim();
 if(!name) return;

 data[firma].items.unshift({
  id:getId(),
  name,
  size:document.getElementById("size").value,
  type:document.getElementById("type").value,
  created:Date.now()
 });

 save();
 render();
}

/* 10 TAGE CHECK */
function old(x){
 return Date.now()-x.created>10*24*60*60*1000;
}

/* RENDER */
function render(){

 let c=document.getElementById("content");

 if(!firma){
 c.innerHTML="<h2>Bitte Firma wählen</h2>";
 return;
 }

 let items=data[firma].items.sort((a,b)=>b.created-a.created);

 if(view==="list"){

 c.innerHTML=items.map(x=>`
 <div class="item">
 <div class="big">📦 ${x.id}</div>
 ${x.name} | ${x.size} | ${x.type}
 ${old(x)?"<div class='warn'>⚠ älter als 10 Tage</div>":""}
 </div>
 `).join("");

 }

 if(view==="search"){
 c.innerHTML=`
 <div class="card">
 <input oninput="search(this.value)" placeholder="Name suchen...">
 <div id="res"></div>
 </div>`;
 }
}

/* SEARCH */
function search(t){
 let r=document.getElementById("res");
 let f=data[firma].items.find(x=>x.name.toLowerCase().includes(t.toLowerCase()));
 r.innerHTML=f?`📦 <b>${f.id}</b> ${f.name}`:"kein Treffer";
}

/* TRASH SIMPLE */
function openTrash(){
 alert("Papierkorb Feature bleibt integriert (kann ich als Upgrade noch fertig ausbauen)");
}

</script>

</body>
</html>
