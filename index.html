<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paketshop Pro V5</title>

<style>
:root{
    --dpd:#d60000;
    --gls:#0b2a6f;
    --hermes:#4aa3ff;
    --bg:#f4f6f8;
    --card:#fff;
    --text:#111;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    height:100vh;
}

.box{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.dpd{background:var(--dpd);}
.gls{background:var(--gls);}
.hermes{background:var(--hermes);}

/* APP */
.app{display:none;padding:10px;}

.header{
    padding:15px;
    color:white;
    font-size:20px;
    font-weight:bold;
    border-radius:8px;
    margin-bottom:10px;
}

.card{
    background:var(--card);
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

input,select,button{
    width:100%;
    padding:8px;
    margin:5px 0;
}

.item{
    border-left:4px solid #999;
    padding:6px;
    margin:6px 0;
}

/* NOTIFICATION */
#note{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    display:none;
}
</style>
</head>

<body>

<div id="note"></div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<div class="box dpd" onclick="openFirma('dpd')">DPD</div>
<div class="box gls" onclick="openFirma('gls')">GLS</div>
<div class="box hermes" onclick="openFirma('hermes')">HERMES</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div id="header" class="header"></div>

<button onclick="back()">⬅ Zurück</button>

<div class="card">

<h3>Neues Paket</h3>

<input id="search" placeholder="🔍 Suche Name oder ID" oninput="render()">

<input id="name" placeholder="Name">
<select id="size"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
<select id="form"><option>Paket</option><option>Tüte</option><option>Box</option></select>
<input id="info" placeholder="Info">

<button onclick="addPackage()">Speichern</button>

</div>

<div id="list"></div>

</div>

<script>

let currentFirma=null;

let data=JSON.parse(localStorage.getItem("db"))||{
 dpd:{counter:1000,customers:{}},
 gls:{counter:2000,customers:{}},
 hermes:{counter:3000,customers:{}}
};

let editMode=null;

function save(){
 localStorage.setItem("db",JSON.stringify(data));
}

/* NOTIFICATION */
function notify(text){
 let n=document.getElementById("note");
 n.innerText=text;
 n.style.display="block";
 setTimeout(()=>n.style.display="none",2000);
}

/* OPEN */
function openFirma(f){
 currentFirma=f;
 document.getElementById("dashboard").style.display="none";
 document.getElementById("app").style.display="block";

 let names={dpd:"DPD",gls:"GLS",hermes:"Hermes"};
 document.getElementById("header").innerText=names[f];

 render();
}

/* BACK */
function back(){
 document.getElementById("dashboard").style.display="grid";
 document.getElementById("app").style.display="none";
}

/* ADD / EDIT */
function addPackage(){

 let name=document.getElementById("name").value.trim();
 if(!name) return;

 let f=data[currentFirma];

 if(!f.customers[name]){
  f.customers[name]={
   id:f.counter++,
   packages:[]
  };
 }

 let pkg={
  size:document.getElementById("size").value,
  form:document.getElementById("form").value,
  info:document.getElementById("info").value,
  time:Date.now()
 };

 if(editMode){
  f.customers[name].packages[editMode]=pkg;
  editMode=null;
  notify("✏ Paket bearbeitet");
 }else{
  f.customers[name].packages.push(pkg);
  notify("✅ Paket gespeichert");
 }

 save();
 clearInputs();
 render();
}

function clearInputs(){
 document.getElementById("name").value="";
 document.getElementById("info").value="";
}

/* EDIT BUTTON */
function editPackage(name,index){

 let p=data[currentFirma].customers[name].packages[index];

 document.getElementById("name").value=name;
 document.getElementById("size").value=p.size;
 document.getElementById("form").value=p.form;
 document.getElementById("info").value=p.info;

 editMode=index;
}

/* DELETE */
function deleteCustomer(name){
 if(!confirm("Wirklich löschen?")) return;
 delete data[currentFirma].customers[name];
 save();
 render();
 notify("🗑 gelöscht");
}

/* STATS */
function getStats(){
 let f=data[currentFirma];
 let count=Object.keys(f.customers).length;
 let packs=0;

 for(let n in f.customers){
  packs+=f.customers[n].packages.length;
 }

 return `👥 Kunden: ${count} | 📦 Pakete: ${packs}`;
}

/* RENDER */
function render(){

 let list=document.getElementById("list");
 list.innerHTML="";

 let f=data[currentFirma];
 let search=document.getElementById("search").value.toLowerCase();

 list.innerHTML+=`<div class="card">${getStats()}</div>`;

 for(let name in f.customers){

  if(search &&
   !name.toLowerCase().includes(search) &&
   !String(f.customers[name].id).includes(search)
  ) continue;

  let c=f.customers[name];

  let html=`<div class="card">
  <h3>${name} (ID ${c.id})</h3>`;

  c.packages.forEach((p,i)=>{
   html+=`
   <div class="item">
    Paket ${i+1}<br>
    ${p.size} | ${p.form}<br>
    ${p.info||""}<br>
    <button onclick="editPackage('${name}',${i})">✏ Bearbeiten</button>
   </div>`;
  });

  html+=`
  <button onclick="deleteCustomer('${name}')">🗑 Löschen</button>
  </div>`;

  list.innerHTML+=html;
 }
}

</script>

</body>
</html>
